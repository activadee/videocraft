name: Auto-Fix Documentation

# Automated documentation improvement workflow
# Directly makes commits to main with fixes

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'docs/**'
      - 'CLAUDE.md'
      - '**/CLAUDE.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'internal/**/*.go'
      - 'pkg/**/*.go'
      - 'cmd/**/*.go'
      - 'scripts/**/*.py'
  workflow_dispatch:  # Allow manual triggers
permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write
  actions: write
  statuses: write
  id-token: write
jobs:
  auto-fix-documentation:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    
    permissions:
      contents: write
      pull-requests: read
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2
          
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Documentation Bot"
          
      - name: Review and Fix Documentation
        id: claude-review
        uses: grll/claude-code-action@beta
        with:
          use_oauth: true
          claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}
          timeout_minutes: "60"
          
          direct_prompt: |
            🤖 **VideoCraft Documentation Auto-Fix**
            
            I need you to review and automatically fix documentation issues in the VideoCraft video generation platform.
            
            ## 🎯 **Auto-Fix Tasks**
            
            ### 1. **Formatting Fixes** (Apply immediately)
            - Fix markdown syntax errors
            - Add missing code block language tags
            - Correct heading levels and hierarchy
            - Fix broken internal links
            - Standardize bullet point formatting
            - Remove trailing whitespace
            - Ensure consistent line endings
            
            ### 2. **Content Corrections** (Apply immediately)
            - Fix spelling and grammar errors
            - Correct obvious typos
            - Update outdated version numbers in examples
            - Fix broken external links where possible
            - Standardize terminology usage
            - Correct code syntax in examples
            
            ### 3. **VideoCraft-Specific Fixes**
            - Ensure API endpoint URLs match current implementation
            - Verify configuration examples are syntactically correct
            - Update Docker commands to match current Dockerfile
            - Fix Python import statements in examples
            - Correct Go package names and imports
            - Update environment variable names to match current config
            
            ### 4. **Cross-Reference Updates**
            - Update links between CLAUDE.md files
            - Ensure README.md reflects current features
            - Sync version numbers across all docs
            - Update changelog format consistency
            
            ## 📝 **Instructions**
            
            **IMPORTANT: You must actually edit the files, not just suggest changes.**
            
            1. **Read all documentation files thoroughly**
            2. **Identify issues that can be automatically fixed**
            3. **Make the actual file edits using available tools**
            4. **Focus on safe, obvious improvements only**
            5. **Do not change technical content without verification**
            
            ## 🚫 **Do NOT Fix** (Leave for manual review)
            - Complex technical explanations that need verification
            - API documentation that might not match implementation
            - Security-related content
            - Architecture decisions or design explanations
            - Code examples that might break functionality
            
            ## ✅ **Safe to Fix Automatically**
            - Markdown formatting issues
            - Obvious typos and grammar errors
            - Broken internal file links
            - Missing code highlighting
            - Inconsistent heading styles
            - Trailing whitespace
            - Simple URL updates
            
            **Start by reading the key files, then make necessary edits:**
            
            - `README.md`
            - `CLAUDE.md` 
            - `CHANGELOG.md`
            - `internal/*/CLAUDE.md`
            - `scripts/CLAUDE.md`
            - `security-first.md`
            
            After making fixes, provide a summary of what was changed.
            
          model: "claude-sonnet-4-20250514"
          
      - name: Check for changes
        id: verify-changes
        run: |
          if git diff --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No documentation changes were made"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Documentation changes detected:"
            git diff --name-only
            git diff --stat
          fi
          
      - name: Commit and push fixes
        if: steps.verify-changes.outputs.changes == 'true'
        run: |
          git add -A
          git commit -m "docs: auto-fix documentation issues [skip ci]
          
          🤖 Automated documentation improvements:
          - Fixed markdown formatting issues
          - Corrected spelling and grammar
          - Updated broken links
          - Standardized code highlighting
          - Improved consistency across files
          
          Generated by GitHub Actions Documentation Bot"
          
          git push origin main

  critical-sync-check:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'security') || contains(github.event.head_commit.message, 'api') || contains(github.event.head_commit.message, 'breaking')
    
    permissions:
      contents: write
      issues: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Documentation Bot"
          
      - name: Critical Documentation Sync
        uses: grll/claude-code-action@beta
        with:
          use_oauth: true
          claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}
          
          direct_prompt: |
            🚨 **CRITICAL: Documentation Sync Required** 
            
            A critical commit was detected (security/API/breaking change). 
            I need you to immediately check and update documentation.
            
            ## 🔍 **Required Checks & Fixes**
            
            ### 🔒 **Security Changes**
            If security-related commit:
            - Update `security-first.md` with new requirements
            - Add security notices to README.md
            - Update configuration examples with secure defaults
            - Document any new environment variables
            - Add migration notes for security updates
            
            ### 🔌 **API Changes** 
            If API-related commit:
            - Update API documentation in `internal/api/CLAUDE.md`
            - Add/update endpoint examples
            - Update authentication requirements
            - Document request/response format changes
            - Add version compatibility notes
            
            ### 💥 **Breaking Changes**
            If breaking changes:
            - Add prominent breaking change notices
            - Create migration instructions
            - Update version compatibility matrix
            - Add deprecation warnings
            - Document upgrade path clearly
            
            ## 📝 **Action Required**
            
            **You MUST make the actual documentation updates, not just suggestions.**
            
            1. **Analyze the recent commits** to understand what changed
            2. **Identify all documentation that needs updates**
            3. **Make the necessary file edits immediately**
            4. **Ensure critical information is prominently displayed**
            5. **Add clear upgrade/migration instructions**
            
            **Focus on user safety and clarity. Critical changes must be documented immediately.**
            
          include_diff: true
          model: 'claude-sonnet-4-20250514'
          
      - name: Check for critical updates
        id: check-critical
        run: |
          if git diff --quiet; then
            echo "critical_changes=false" >> $GITHUB_OUTPUT
          else
            echo "critical_changes=true" >> $GITHUB_OUTPUT
            echo "Critical documentation updates made:"
            git diff --name-only
          fi
          
      - name: Commit critical documentation updates
        if: steps.check-critical.outputs.critical_changes == 'true'
        run: |
          git add -A
          git commit -m "docs: critical documentation sync [skip ci]
          
          🚨 CRITICAL: Updated documentation for recent changes
          - Security/API/Breaking change documentation updated
          - Added migration instructions
          - Updated configuration examples
          - Added compatibility notes
          
          Generated by GitHub Actions (Critical Sync)"
          
          git push origin main
          
      - name: Create issue for manual review
        if: steps.check-critical.outputs.critical_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Critical Documentation Updated - Manual Review Required',
              body: `## Critical Documentation Changes Made
              
              The documentation bot automatically updated critical documentation due to recent security/API/breaking changes.
              
              **Please manually review these changes:**
              
              - [ ] Verify technical accuracy of updates
              - [ ] Ensure security implications are properly documented  
              - [ ] Confirm API documentation matches implementation
              - [ ] Review migration instructions for completeness
              - [ ] Test any updated code examples
              
              **Recent commits that triggered this:**
              ${context.payload.head_commit.message}
              
              **Files potentially updated:**
              - README.md
              - security-first.md
              - internal/api/CLAUDE.md
              - CHANGELOG.md
              
              Generated by GitHub Actions Documentation Bot`,
              labels: ['documentation', 'critical', 'needs-review']
            })