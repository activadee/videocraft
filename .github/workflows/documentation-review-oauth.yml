name: Documentation Review (OAuth)

# Alternative workflow using Claude OAuth for Claude Max subscribers
# This version uses the GitHub app integration instead of API keys

on:
  push:
    branches: [main]
    paths:
      - '**.md'
      - 'docs/**'
      - 'CLAUDE.md'
      - '**/CLAUDE.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'internal/**/*.go'
      - 'pkg/**/*.go'
      - 'cmd/**/*.go'
      - 'scripts/**/*.py'
  workflow_dispatch:  # Allow manual triggers

jobs:
  claude-documentation-review:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != null
    
    permissions:
      contents: read
      issues: write
      pull-requests: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Documentation Quality Review
        uses: grll/claude-code-action@beta
        with:
          # OAuth-based authentication (requires Claude GitHub app installation)
          use_oauth: true
          claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}
          timeout_minutes: "60"
          
          # Comprehensive documentation review prompt
          direct_prompt: |
            🔍 **VideoCraft Documentation Review**
            
            I'm reviewing documentation changes in the VideoCraft video generation platform. Please analyze:
            
            ## 📋 Review Criteria
            
            ### 1. **Technical Accuracy**
            - Verify code examples compile and work correctly
            - Check API endpoint documentation matches implementation
            - Validate configuration examples are syntactically correct
            - Ensure version numbers and dependencies are current
            
            ### 2. **VideoCraft-Specific Areas**
            
            **Progressive Subtitles System:**
            - Word-level timing explanations are accurate
            - Scene-based timing calculations are correct
            - ASS subtitle generation process is well documented
            - Python-Go integration details are complete
            
            **Security Documentation:**
            - Authentication setup is clearly explained
            - SSL/TLS configuration is accurate
            - Container security settings are documented
            - Input validation guidelines are comprehensive
            
            **API Documentation:**
            - All endpoints in `internal/api/` are documented
            - Request/response examples are current and valid
            - Authentication requirements are clear
            - Error responses are properly documented
            
            ### 3. **Documentation Quality**
            - Clear, concise writing
            - Proper markdown formatting
            - Working links and references
            - Consistent terminology usage
            - Appropriate code highlighting
            
            ### 4. **Completeness Check**
            - New features have corresponding documentation
            - Configuration options are explained
            - Security implications are addressed
            - Deployment instructions are complete
            - Examples are provided for complex features
            
            ## 🎯 Key Files to Cross-Reference
            
            - `README.md` - Main project documentation
            - `CLAUDE.md` - Technical architecture docs
            - `internal/api/CLAUDE.md` - API reference
            - `internal/services/CLAUDE.md` - Service documentation
            - `scripts/CLAUDE.md` - Python integration
            - `security-first.md` - Security requirements
            
            ## 📝 Review Output Format
            
            Provide feedback in this structure:
            
            ### ✅ **What's Good**
            - List positive aspects of the documentation
            
            ### ⚠️ **Issues Found**
            - Specific problems with line numbers/files when possible
            - Technical inaccuracies
            - Missing information
            - Broken links or references
            
            ### 🚀 **Improvement Suggestions**
            - Specific, actionable recommendations
            - Additional examples that would be helpful
            - Areas where more detail is needed
            
            ### 🔄 **Sync Check**
            - Whether documentation matches current code
            - Any code changes that need documentation updates
            
            ## 🎖️ **Quality Score**
            Rate the overall documentation quality (1-10) and justify the score.
            
            ---
            
            Please be thorough but constructive. Focus on helping maintain VideoCraft's high documentation standards.
            
          # Advanced configuration
          model: "claude-sonnet-4-20250514"

      - name: Check for Critical Documentation Issues
        uses: grll/claude-code-action@beta
        if: contains(github.event.head_commit.message, 'security') || contains(github.event.head_commit.message, 'api') || contains(github.event.head_commit.message, 'breaking')
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          direct_prompt: |
            🚨 **Critical Documentation Sync Check**
            
            A potentially critical commit was detected (security/API/breaking change).
            
            Please perform an urgent review focusing on:
            
            ### 🔒 **Security Documentation**
            If security-related:
            - Are security configurations updated?
            - Are vulnerability fixes documented?
            - Are secure defaults explained?
            - Is the security-first.md file updated?
            
            ### 🔌 **API Documentation** 
            If API-related:
            - Are new/changed endpoints documented?
            - Are request/response examples updated?
            - Are authentication requirements current?
            - Are breaking changes highlighted?
            
            ### 💥 **Breaking Changes**
            If breaking changes:
            - Are migration instructions provided?
            - Are deprecation notices clear?
            - Are version compatibility notes updated?
            - Are upgrade paths documented?
            
            **Flag any critical documentation gaps that could impact users.**
            
          include_diff: true
          model: 'claude-sonnet-4-20250514'

  documentation-suggestions:
    runs-on: ubuntu-latest
    needs: claude-documentation-review
    if: always()  # Run even if previous job fails
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Generate Documentation Improvement Suggestions
        uses: grll/claude-code-action@beta
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          
          direct_prompt: |
            📈 **Documentation Enhancement Suggestions**
            
            Based on the current VideoCraft documentation, suggest specific improvements:
            
            ### 🎯 **Quick Wins** (Easy improvements)
            - Formatting fixes
            - Missing code block language specifications
            - Broken internal links
            - Spelling/grammar corrections
            
            ### 📚 **Content Enhancements** (Medium effort)
            - Additional examples that would be helpful
            - Areas where more detail would improve understanding
            - Cross-references that should be added
            - Clarifications for complex concepts
            
            ### 🏗️ **Structural Improvements** (Larger effort)
            - Documentation organization suggestions
            - New sections that would be valuable
            - Better integration between different docs
            - User journey improvements
            
            ### 🔍 **Missing Documentation** (Critical gaps)
            - Undocumented features
            - Missing configuration options
            - Incomplete API coverage
            - Security gaps
            
            **Format as actionable GitHub issues that could be created.**
            
          model: "claude-4-sonnet-20241022"